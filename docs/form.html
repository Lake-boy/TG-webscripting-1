<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Form</title>
</head>
<body>
    <header>
        <H1>Message Form</H1>
        <p style="margin-bottom: 0.25rem;">links to the games steam page.</p>
    </header>

    <nav>
        <a href="https://store.steampowered.com/app/1030300/Hollow_Knight_Silksong/">Sliksong</a>
        <a href="https://store.steampowered.com/app/1671210/DELTARUNE/">Deltarune</a>
        <a href="https://store.steampowered.com/app/1657630/Slime_Rancher_2/">Slime Rancher 2</a>
    </nav>

    <main>

        <form>
            <fieldset>
            <label for="f_name">Frist Name</label>
            <label for="l_name" style="margin-left: 3.5rem;">Last Name</label>
            <label for="e_mail" style="margin-left: 4rem;">EMail</label>
            </fieldset>
            <fieldset>
            <input type="text", id="f_name", minlength="2", required, placeholder="Dave">
            <input type="text", id="l_name", minlength="2", required, placeholder="Douglas">
            <input type="email", id="e_mail", required, placeholder="Douglasiscool123@gmail.com">
            </fieldset>
            <fieldset>
            <textarea name="message" id="message", minlength="10", required, placeholder="Message"></textarea>
            <input type="submit">
            <input type="reset">
            </fieldset>
        </form>

        <a href="index.html">
            <button id="back_button">Back</button>
        </a>
    </main>

    <footer>
        <P>Copyright 2026 Tyson Galvin</P>
        <a href="https://jasperpuppet.itch.io">My Itch Account</a>
    </footer>
</body>
</html>
